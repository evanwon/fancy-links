name: Build and Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release (only for manual builds)'
        type: boolean
        default: false
      submit_to_amo:
        description: 'Submit to AMO for public distribution'
        type: boolean
        default: false
      channel:
        description: 'AMO submission channel'
        type: choice
        options:
          - listed
          - unlisted
        default: listed
      version_notes:
        description: 'Version notes for AMO submission'
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    uses: evanwon/extension-workflows/.github/workflows/build-release.yml@v1
    with:
      extension-name: fancy-links
      extension-display-name: "Fancy Links"
      extension-description: "Transforms plain URLs into friendly links with page titles."
      manifest-version: 2
      lint-warnings-as-errors: true
      validate-tag-matches-manifest: true
      amo-submission-enabled: ${{ vars.AMO_SUBMISSION_ENABLED == 'true' }}
      issues-url: "https://github.com/evanwon/fancy-links/issues"
      amo-url: "https://addons.mozilla.org/en-US/firefox/addon/fancy-links/"
      firefox-min-version: "142+"
      permissions-description: "clipboardWrite, activeTab, storage, notifications"
      create-release: ${{ github.event.inputs.create_release == 'true' }}
      submit-to-amo: ${{ github.event.inputs.submit_to_amo == 'true' }}
      channel: ${{ github.event.inputs.channel || 'listed' }}
      version-notes: ${{ github.event.inputs.version_notes || '' }}
    secrets: inherit

name: Test Pull Request

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'manifests/**'
      - 'package*.json'
      - 'jest.config.js'

jobs:
  test:
    uses: evanwon/browser-extension-workflows/.github/workflows/test-pr.yml@v1
    with:
      lint-warnings-as-errors: true
      validate-versions: true
      security-audit-strict: true
      upload-coverage: true
      chrome-enabled: true
